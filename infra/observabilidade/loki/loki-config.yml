auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Configurações para leitura de logs enviados pelo promtail

limits_config:
  ingestion_rate_mb: 50           
  ingestion_burst_size_mb: 100    
  max_streams_per_user: 100000 
  max_global_streams_per_user: 100000