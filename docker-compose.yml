
services:
  eureka:
    build:
      context: services/eureka
      dockerfile: ../../infra/docker/jre/Dockerfile
    container_name: remessa-eureka
    ports:
      - ${EUREKA_PORT}:${EUREKA_PORT}
    environment:
      EUREKA_URL: ${EUREKA_URL}
      APP_EUREKA_HOSTNAME: ${APP_EUREKA_HOSTNAME}
      EUREKA_PORT: ${EUREKA_PORT}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${EUREKA_PORT}/actuator/health"]
    networks:
      - remessa
    restart: unless-stopped

  gateway:
    build:
      context: services/gateway
      dockerfile: ../../infra/docker/jre/Dockerfile
    container_name: remessa-gateway
    ports:
      - ${GATEWAY_PORT}:${GATEWAY_PORT}
    environment:
      APP_GATEWAY_HOSTNAME: ${APP_GATEWAY_HOSTNAME}
      EUREKA_URL: ${EUREKA_URL}
      GATEWAY_PORT: ${GATEWAY_PORT}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${GATEWAY_PORT}/actuator/health"]
    networks:
      - remessa
    restart: unless-stopped
    depends_on:
      eureka:
        condition: service_healthy 

  portal-bancario:
    build:
      context: services/portal-bancario
      dockerfile: ../../infra/docker/jre/Dockerfile
    container_name: remessa-portal-bancario
    ports:
      - "${PORTAL_BANCARIO_PORT}:${PORTAL_BANCARIO_PORT}"
    environment:
      APP_PORTAL_BANCARIO_HOSTNAME: ${APP_PORTAL_BANCARIO_HOSTNAME}
      EUREKA_URL: ${EUREKA_URL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_NODE_PORT: ${RABBITMQ_NODE_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      PORTAL_BANCARIO_PORT: ${PORTAL_BANCARIO_PORT}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORTAL_BANCARIO_PORT}/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - remessa
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
        restart: true
      eureka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  integracao-monetaria:
    build:
      context: services/integracao-monetaria
      dockerfile: ../../infra/docker/jre/Dockerfile
    container_name: remessa-integracao-monetaria
    ports:
      - ${INTEGRACAO_MONETARIA_PORT}:${INTEGRACAO_MONETARIA_PORT}
    environment:
      APP_INTEGRACAO_MONETARIA_HOSTNAME: ${APP_INTEGRACAO_MONETARIA_HOSTNAME}
      EUREKA_URL: ${EUREKA_URL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_NODE_PORT: ${RABBITMQ_NODE_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      INTEGRACAO_MONETARIA_PORT: ${INTEGRACAO_MONETARIA_PORT}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${INTEGRACAO_MONETARIA_PORT}/actuator/health"]
    networks:
      - remessa
    restart: unless-stopped
    depends_on:
      eureka:
        condition: service_healthy 
      rabbitmq: 
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: remessa-rabbitmq
    ports:
      - ${RABBITMQ_NODE_PORT}:${RABBITMQ_NODE_PORT}
      - ${RABBITMQ_MANAGEMENT_TCP_PORT}:${RABBITMQ_MANAGEMENT_TCP_PORT}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_NODE_PORT: ${RABBITMQ_NODE_PORT}
      RABBITMQ_MANAGEMENT_TCP_PORT: ${RABBITMQ_MANAGEMENT_TCP_PORT}
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - remessa
    restart: unless-stopped

  postgresql:
    image: postgres:16-alpine
    container_name: remessa-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - remessa
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


  grafana:
    build:
      context: .
      dockerfile: infra/docker/grafana/Dockerfile
    container_name: remessa-grafana
    ports:
      - ${GF_SERVER_HTTP_PORT}:${GF_SERVER_HTTP_PORT}
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: ${GF_INSTALL_PLUGINS}
      GF_SERVER_HTTP_PORT: ${GF_SERVER_HTTP_PORT}
    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_log:/var/log/grafana
    networks:
      - remessa
    restart: unless-stopped


  prometheus:
    image: prom/prometheus:latest
    container_name: remessa-prometheus
    ports:
      - ${PROMETHEUS_PORT}:${PROMETHEUS_PORT}
    environment:
      PROMETHEUS_PORT: ${PROMETHEUS_PORT}
    volumes:
      - prometheus_data:/prometheus
    networks:
      - remessa
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: remessa-loki
    ports:
      - ${LOKI_PORT}:${LOKI_PORT}
    environment:
      LOKI_PORT: ${LOKI_PORT}
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
      - remessa
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: remessa-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail_data:/tmp
    command: -config.file=/etc/promtail/config.yml
    networks:
      - remessa
    restart: unless-stopped

volumes:
  rabbitmq_data:
    driver: local
  grafana_data:
    driver: local
  grafana_log:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  promtail_data:
    driver: local
  postgres_data:
    driver: local

  
networks:
  remessa:
    driver: bridge
 


